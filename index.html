<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Sports IPTV Directory</title>
    <meta
      name="description"
      content="Browse IPTV sports channels around the world with a built-in player, filtered by country and sport type."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <header class="hero">
      <div class="hero-content"></div>
    </header>

    <main id="directory" class="container">
      <section class="player-section" aria-label="Embedded IPTV player">
        <div class="player-card">
          <div class="player-header">
            <div></div>
            <span class="player-state"></span>
          </div>

          <div class="video-frame">
            <video id="iptvPlayer" controls playsinline preload="metadata"></video>
          </div>

          <div class="player-meta">
            <div class="meta-row">
              <span id="playerCountry" class="badge"></span>
              <span id="playerSport" class="badge"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="toolbar" aria-label="Channel filters">
        <div class="search-box">
          <label for="searchInput">Search by name or language</label>
          <input id="searchInput" type="text" placeholder="Search channels" />
        </div>

        <div class="filter-group">
          <label for="countryFilter">Country</label>
          <select id="countryFilter">
            <option value="all">All countries</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="sportFilter">Sport</label>
          <select id="sportFilter">
            <option value="all">All sports</option>
          </select>
        </div>
      </section>

      <section class="stats" aria-label="Directory statistics">
        <article>
          <strong id="totalChannels">0</strong>
          <span>Channels</span>
        </article>
        <article>
          <strong id="totalCountries">0</strong>
          <span>Countries</span>
        </article>
        <article>
          <strong id="totalSports">0</strong>
          <span>Sports</span>
        </article>
      </section>

      <section id="channelGrid" class="channel-grid" aria-live="polite"></section>
    </main>

    <section id="about" class="about container"></section>

    <footer class="footer"></footer>

    <script src="app.js"></script>
  </body>
</html>
